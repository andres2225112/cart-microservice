name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint con flake8
        run: flake8 app/

  test-coverage:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Correr tests con cobertura
        run: |
          pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json \
            --cov-fail-under=80

      - name: Publicar cobertura en GitHub Actions Summary
        if: always()
        run: |
          python3 -c "
          import json
          with open('coverage.json') as f:
              cov = json.load(f)
          pct = cov['totals']['percent_covered']
          print(f'## Cobertura de tests')
          print(f'**Total: {pct:.1f}%**')
          print()
          print('| Archivo | Cobertura |')
          print('|---------|-----------|')
          for fname, data in cov['files'].items():
              if fname.startswith('app/'):
                  p = data['summary']['percent_covered']
                  print(f'| {fname} | {p:.0f}% |')
          " >> $GITHUB_STEP_SUMMARY

      - name: Subir reporte de cobertura como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage.json

  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cart-microservice:test .
        